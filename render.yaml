# Render Blueprint: https://render.com/docs/blueprint-spec
#
# Deploy via Render Dashboard → New → Blueprint → connect this repository.
# Render sets PORT automatically — do not override it.
#
# For native Node.js deployment (no Docker), see DEPLOYMENT.md.

services:
  - type: web
    name: react-a11y-test
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
